<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>E-ABSENSI</title>
    <meta name="description" content="Sistem Absensi Digital SMP Negeri 1 Kebakkramat" />
    <meta name="author" content="SMPN 1 Kebakkramat" />

    <!-- Theme color (browser UI & status bar) -->
    <meta name="theme-color" content="#0f1117" />

    <!-- iOS / Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="E-Absensi" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Prevent user zoom saat scan QR -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="E-ABSENSI" />
    <meta property="og:description" content="Sistem Absensi Digital SMP Negeri 1 Kebakkramat" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="E-ABSENSI" />
    <meta name="twitter:description" content="Sistem Absensi Digital SMP Negeri 1 Kebakkramat" />

    <!-- Fonts: preconnect + async load agar tidak memblokir render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" /></noscript>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
